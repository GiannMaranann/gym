<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeffrey's Gym | Login & Register</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f131a;
      --bg-soft: #151b24;
      --card: rgba(20, 25, 34, 0.88);
      --card-2: rgba(17, 22, 30, 0.94);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --text: #f4f7fb;
      --text-soft: #c5cedd;
      --text-muted: #93a0b6;
      --primary: #0b57d0;
      --primary-light: #8ab4f8;
      --primary-soft: rgba(138, 180, 248, 0.12);
      --success-bg: rgba(28, 108, 63, 0.22);
      --success-text: #d1ffe0;
      --shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --ease: cubic-bezier(.22,.61,.36,1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(11, 87, 208, 0.18), transparent 24%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.04), transparent 22%),
        linear-gradient(135deg, #0d1016 0%, #12161d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.22), rgba(0,0,0,0));
    }

    .auth-wrap {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
      padding: 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 26px;
    }

    .brand-logo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(138,180,248,0.4);
      box-shadow: 0 10px 25px rgba(11,87,208,0.35);
      transition: all 0.3s var(--ease);
    }

    .brand-logo:hover {
      transform: scale(1.08) rotate(5deg);
      border-color: rgba(138,180,248,0.8);
      box-shadow: 0 15px 30px rgba(11,87,208,0.5);
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff;
      background: linear-gradient(135deg, #fff, var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .form-header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
      color: #fff;
    }

    .form-header p {
      color: var(--text-soft);
      font-size: 0.97rem;
      line-height: 1.7;
    }

    .tabs {
      display: flex;
      margin-bottom: 24px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      padding: 6px;
      gap: 6px;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 16px;
      background: transparent;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.98rem;
      font-weight: 800;
      border-radius: 12px;
      transition: all .25s var(--ease);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), #4d90fe);
      color: #fff;
      box-shadow: 0 10px 22px rgba(11, 87, 208, 0.22);
    }

    form {
      display: none;
      animation: fadeUp .35s var(--ease);
    }

    form.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 0.94rem;
      font-weight: 600;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 0.97rem;
      outline: none;
      transition: all .25s var(--ease);
    }

    .input-group input::placeholder {
      color: #8f9aab;
    }

    .input-group select option {
      color: #111;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: rgba(138, 180, 248, 0.45);
      box-shadow: 0 0 0 4px rgba(138, 180, 248, 0.12);
      background: rgba(255,255,255,0.06);
    }

    .btn {
      width: 100%;
      padding: 15px 18px;
      background: linear-gradient(135deg, var(--primary), #4d90fe);
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      margin-top: 8px;
      box-shadow: 0 14px 28px rgba(11, 87, 208, 0.24);
      transition: all .25s var(--ease);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      display: none;
      text-align: center;
      font-weight: 700;
      line-height: 1.6;
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid rgba(74, 170, 111, 0.18);
    }

    .note {
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .auth-card {
        padding: 24px 18px;
      }

      .form-header h1 {
        font-size: 1.8rem;
      }

      .tabs {
        flex-direction: column;
      }

      .tab-btn {
        width: 100%;
      }

      .brand-name {
        font-size: 1.3rem;
      }

      .brand-logo {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand">
        <img src="gym_logo.jpg" alt="Jeffrey's Gym Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/60x60/0b57d0/ffffff?text=JG'">
        <div class="brand-name">Jeffrey’s Gym</div>
      </div>

      <div class="form-header">
        <h1>Account Access</h1>
        <p>Login or register to continue.</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" type="button" onclick="showForm('login')">Login</button>
        <button class="tab-btn" type="button" onclick="showForm('register')">Register</button>
      </div>

      <form id="loginForm" class="active">
        <div class="input-group">
          <label for="loginEmail">📧 Email</label>
          <input id="loginEmail" type="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label for="loginPassword">🔒 Password</label>
          <input id="loginPassword" type="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <form id="registerForm">
        <div class="input-group">
          <label for="registerName">👤 Full Name</label>
          <input id="registerName" type="text" placeholder="Enter full name" required />
        </div>

        <div class="input-group">
          <label for="registerEmail">📧 Email</label>
          <input id="registerEmail" type="email" placeholder="Enter your email" required />
        </div>

        <div class="input-group">
          <label for="registerPassword">🔒 Password</label>
          <input id="registerPassword" type="password" placeholder="Create password" required />
        </div>

        <div class="input-group">
          <label for="registerPlan">🎯 Membership Plan</label>
          <select id="registerPlan" required>
            <option value="">Select Plan</option>
            <option>Basic - ₱500/month</option>
            <option>Standard - ₱900/month</option>
            <option>Premium - ₱1,500/month</option>
          </select>
        </div>

        <button type="submit" class="btn">Register</button>
      </form>

      <div id="messageBox" class="message success"></div>
      <p class="note">⚡ Front-end template only. Connect this to your database later.</p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const tabButtons = document.querySelectorAll(".tab-btn");
    const messageBox = document.getElementById("messageBox");

    function showForm(type) {
      messageBox.style.display = "none";
      messageBox.className = "message success";

      if (type === "login") {
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
        tabButtons[0].classList.add("active");
        tabButtons[1].classList.remove("active");
      } else {
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
        tabButtons[1].classList.add("active");
        tabButtons[0].classList.remove("active");
      }
    }

    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();
      messageBox.style.display = "block";
      messageBox.className = "message success";
      messageBox.textContent = "✅ Login successful! Redirecting to dashboard...";
      
      // Simulate redirect after 2 seconds
      setTimeout(() => {
        window.location.href = "admin_dashboard.html";
      }, 2000);
    });

    registerForm.addEventListener("submit", function(e) {
      e.preventDefault();
      messageBox.style.display = "block";
      messageBox.className = "message success";
      messageBox.textContent = "✅ Registration successful! Account created. Redirecting to login...";
      registerForm.reset();
      
      // Switch to login form after 2 seconds
      setTimeout(() => {
        showForm('login');
        messageBox.style.display = "none";
      }, 2000);
    });
  </script>

</body>
</html>
